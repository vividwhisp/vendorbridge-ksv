services:
  app:
    build: .
    container_name: datahub-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "file:/app/data/dev.db"
      NEXTAUTH_SECRET: "change-this-to-a-random-secret-in-production"
      NEXTAUTH_URL: "http://localhost:3000"
    volumes:
      - datahub-data:/app/data

volumes:
  datahub-data:
